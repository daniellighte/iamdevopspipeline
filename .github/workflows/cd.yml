name: CD Pipeline — IAM System

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}/iam-api

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Development
        run: curl -sf -X POST ${{ secrets.RENDER_DEV_DEPLOY_HOOK }}
      - name: Smoke test
        run: |
          sleep 30
          curl --fail https://iam-dev.onrender.com/health || exit 1
          curl --fail https://iam-dev.onrender.com/auth/ping || exit 1

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Run integration + E2E suite against staging
        run: npm run test:e2e -- --baseUrl https://iam-staging.onrender.com
        env:
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://iam.yourdomain.com
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production (rolling update)
        run: curl -sf -X POST ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}

      - name: Post-deployment verification (6 × 10s)
        id: healthcheck
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 10
            curl --fail https://iam.yourdomain.com/health && exit 0
          done
          exit 1

      - name: Auto-rollback on verification failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "Health check failed — rolling back to previous digest"
          curl -sf -X POST ${{ secrets.RENDER_PROD_ROLLBACK_HOOK }}
