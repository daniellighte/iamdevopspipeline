name: Setup Node Environment

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: cache-${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

    - name: Install dependencies
      run: npm ci
      shell: bash
